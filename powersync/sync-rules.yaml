# Weeko — PowerSync Sync Rules (deploy to your PowerSync Cloud instance).
# Single-user-per-account: each user syncs only their own rows. `user_id` is
# matched against the authenticated Supabase user (request.user_id() = auth uid).
#
# All synced tables have a text `id` PK + `user_id` (match src/db/powersync/schema.ts).
# food_product + coach_dismissal are LOCAL-ONLY (not synced) — not listed here.
bucket_definitions:
  user_data:
    parameters: SELECT request.user_id() AS user_id
    data:
      - SELECT * FROM profile WHERE user_id = bucket.user_id
      - SELECT * FROM weekly_structure WHERE user_id = bucket.user_id
      - SELECT * FROM notification_pref WHERE user_id = bucket.user_id
      - SELECT * FROM equipment WHERE user_id = bucket.user_id
      - SELECT * FROM exercise WHERE user_id = bucket.user_id
      - SELECT * FROM week WHERE user_id = bucket.user_id
      - SELECT * FROM block WHERE user_id = bucket.user_id
      - SELECT * FROM task WHERE user_id = bucket.user_id
      - SELECT * FROM session_template WHERE user_id = bucket.user_id
      - SELECT * FROM workout_session WHERE user_id = bucket.user_id
      - SELECT * FROM set_log WHERE user_id = bucket.user_id
      - SELECT * FROM week_template WHERE user_id = bucket.user_id
      - SELECT * FROM food_entry WHERE user_id = bucket.user_id
      - SELECT * FROM body_measurement WHERE user_id = bucket.user_id
